// рџ“Њ РЎРѕР·РґР°РЅРёРµ РєРЅРѕРїРѕРє
const nav=document.getElementById("fighterButtons");
Object.keys(fighters).forEach(name=>{
  const btn=document.createElement("button");
  btn.innerHTML=`<img class="portrait" src="${fighters[name].portrait}" alt="${name}">${name}`;
  btn.onclick=()=>showFighter(name);
  nav.appendChild(btn);
});

// рџ“Њ РџРѕРєР°Р· РёРЅС„РѕСЂРјР°С†РёРё
function showFighter(name){
  const f=fighters[name];
  document.getElementById("fighterDisplay").innerHTML=`
    <h2>${name} <a class="wikiLink" href="https://mortalkombat.fandom.com/wiki/${encodeURIComponent(name)}" target="_blank">Wiki</a></h2>
    <div class="sectionTitle">рџ’Ђ Fatalities:</div>
    <div class="move-list">${f.f.map(a=>`<p>${a}</p>`).join("")}
      <iframe src="${f.videoF}" allowfullscreen></iframe>
    </div>
    <div class="sectionTitle">рџЏџ Stage Fatalities:</div>
    <div class="move-list">${f.s.map(a=>`<p>${a}</p>`).join("")}
      <iframe src="${f.videoS}" allowfullscreen></iframe>
    </div>
    <div class="sectionTitle">рџ©ё Brutalities:</div>
    <div class="move-list">${f.b.map(a=>`<p>${a}</p>`).join("")}
      <iframe src="${f.videoB}" allowfullscreen></iframe>
    </div>
    <div class="sectionTitle">рџЋ‰ Friendships:</div>
    <div class="move-list">${f.fr.map(a=>`<p>${a}</p>`).join("")}
      <iframe src="${f.videoFr}" allowfullscreen></iframe>
    </div>`;
}

// рџ”Ћ РџРѕРёСЃРє
document.getElementById("searchFighter").addEventListener("input",function(){
  const v=this.value.toLowerCase();
  Array.from(nav.children).forEach(btn=>{
    btn.style.display = btn.textContent.toLowerCase().includes(v)?"":"none";
  });
});
