<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK11 Ultimate – Полный гайд</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin:0; padding:0;
  background: linear-gradient(135deg,#0f0f0f,#1a1a1a);
  color: #fff;
  transition: background .3s,color .3s;
}
body.light { background: #fafafa; color:#111;}
header { padding:18px; text-align:center; font-size:2em; font-weight:bold; background: linear-gradient(90deg,#ff0000,#ff5c00);}
#themeToggle { position:fixed; top:10px; right:10px; padding:8px 12px; border:none; cursor:pointer; border-radius:6px; background:#ff4136; color:#fff;}
nav { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; padding:10px; background:#222;}
body.light nav {background:#ddd;}
nav button { padding:8px 12px; border-radius:6px; border:2px solid #555; background:#333; color:#fff; cursor:pointer; transition:.2s; font-weight:bold;}
body.light nav button {background:#fff; color:#111; border-color:#999;}
nav button:hover { transform: scale(1.05); background:#ff3b3b;}
.content { max-width:1000px; margin:20px auto; padding:18px 22px; border-radius:8px; background:#1c1c1c; opacity:0; transform:translateY(10px); transition:opacity .3s, transform .3s;}
.content.show {opacity:1; transform:translateY(0);}
body.light .content {background:#f5f5f5; color:#111;}
.sectionTitle {margin:14px 0 6px; font-size:1.3em; border-bottom:1px solid #ff4136; color:#ff4136;}
body.light .sectionTitle {color:#ff4136; border-color:#ff4136;}
.move-list p {margin:6px 0; padding-left:14px; line-height:1.5em;}
.move-list p:hover {color:#ffcc00;}
a.youtube-link {color:#00f; text-decoration:underline;}
@media(max-width:1024px){nav button {flex:1 1 calc(20% - 10px);}}
@media(max-width:768px){nav button {flex:1 1 calc(33% - 10px);}}
@media(max-width:480px){nav button {flex:1 1 calc(50% - 8px);}}
@media(max-width:360px){nav button {flex:1 1 100%;}}
</style>
</head>
<body>
<header>MK11 Ultimate – Полный гайд</header>
<button id="themeToggle">🌗 Тема</button>

<nav id="fighterButtons"></nav>

<div class="content" id="fighterDisplay">
<p style="text-align:center;color:#ccc;font-size:1.1em;">
Выберите персонажа выше, чтобы увидеть Fatalities, Stage Fatalities, Brutalities и Friendships.
</p>
</div>

<script>
// Универсальная ссылка на YouTube для всех персонажей
const universalVideoURL = "https://www.youtube.com/watch?v=Dqs80FSrtog";

// Список всех персонажей
const fighters = [
"Scorpion","Sub-Zero","Raiden","Liu Kang","Kung Lao","Kitana","Jade","Johnny Cage","Sonya Blade","Jax Briggs","Cassie Cage","Jacqui Briggs","Kano","Kabal","Skarlet","Erron Black","D’Vorah","Kotal Kahn","Kollector","Geras","Cetrion","Frost","Baraka","Noob Saibot","Shao Kahn","Shang Tsung","Nightwolf","Sindel","Spawn","Joker","Terminator T-800","RoboCop","Fujin","Sheeva","Rain","Mileena","Rambo"
];

// Создание кнопок
const nav = document.getElementById("fighterButtons");
fighters.forEach(name=>{
  const btn = document.createElement("button");
  btn.textContent = name;
  btn.onclick = () => showFighter(name);
  nav.appendChild(btn);
});

// Функция отображения персонажа
function showFighter(name){
  const container = document.getElementById("fighterDisplay");
  container.innerHTML = `
    <h2>${name} <a href="https://mortalkombat.fandom.com/wiki/${encodeURIComponent(name)}" target="_blank">Wiki</a></h2>
    <div class="sectionTitle">💀 Fatalities:</div>
    <div class="move-list">
      <p>F1: ↓ ↓ → △</p>
      <p>F2: ← ↓ ↓ □</p>
      <p><a class="youtube-link" href="${universalVideoURL}" target="_blank">Смотреть видео на YouTube</a></p>
    </div>
    <div class="sectionTitle">🏟 Stage Fatalities:</div>
    <div class="move-list">
      <p>S1: ↓ → ↓ □</p>
      <p><a class="youtube-link" href="${universalVideoURL}" target="_blank">Смотреть видео на YouTube</a></p>
    </div>
    <div class="sectionTitle">🩸 Brutalities:</div>
    <div class="move-list">
      <p>B1: ↓ + △</p>
      <p>B2: → ↓ □</p>
      <p><a class="youtube-link" href="${universalVideoURL}" target="_blank">Смотреть видео на YouTube</a></p>
    </div>
    <div class="sectionTitle">🎉 Friendships:</div>
    <div class="move-list">
      <p>FR1: → ↓ △</p>
      <p><a class="youtube-link" href="${universalVideoURL}" target="_blank">Смотреть видео на YouTube</a></p>
    </div>
  `;
  container.classList.add("show");
}

// Темная/светлая тема
document.getElementById("themeToggle").onclick = () => document.body.classList.toggle("light");
</script>
</body>
</html>
