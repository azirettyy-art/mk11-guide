nav {

  padding:8px; background:#222;
}
body.light nav { background:#ddd; }
nav button {
  background:#333; color:#fff; padding:8px 14px;
  border:2px solid #555; border-radius:8px;
  font-weight:700; cursor:pointer; transition:.3s;
}
body.light nav button { background:#fff; color:#111; border-color:#999; }
nav button:hover { background:#ff3b3b; transform:scale(1.05); }
.content {
  max-width:1000px; margin:20px auto;
  background:#1c1c1c; padding:18px 22px; border-radius:10px;
}
body.light .content { background:#f5f5f5; color:#111; }
.sectionTitle {margin:14px 0 6px; font-size:1.3em; border-bottom:1px solid #ff4136; color:#ff4136;}
body.light .sectionTitle { border-color:#ff4136; color:#ff4136; }
.move-list p { margin:6px 0; padding-left:14px; line-height:1.5em; }

// Навигация
const nav=document.getElementById("fighterButtons");
Object.keys(fighters).forEach(name=>{
  const btn=document.createElement("button");
  btn.textContent=name;
  btn.onclick=()=>showFighter(name);
  nav.appendChild(btn);
});

// Показ информации
function showFighter(name){
  const f=fighters[name];
  document.getElementById("fighterDisplay").innerHTML=`
    <h2>${name} <a class="wikiLink" href="https://mortalkombat.fandom.com/wiki/${encodeURIComponent(name)}" target="_blank">Wiki</a></h2>
    <div class="sectionTitle">💀 Fatalities:</div>
    <div class="move-list">${f.f.map(a=>`<p>${ps(a)}</p>`).join("")}</div>
    <div class="sectionTitle">🏟 Stage Fatalities:</div>
    <div class="move-list">${f.s.map(a=>`<p>${ps(a)}</p>`).join("")}</div>
    <div class="sectionTitle">🩸 Brutalities:</div>
    <div class="move-list">${f.b.map(b=>`<p>${ps(b.cmd)} – ${b.cond}</p>`).join("")}
      <iframe src="${f.video}" frameborder="0" allowfullscreen></iframe>
    </div>`;
}

// Поиск
document.getElementById("searchFighter").addEventListener("input",function(){
  const v=this.value.toLowerCase();
  Array.from(nav.children).forEach(btn=>{
    btn.style.display = btn.textContent.toLowerCase().includes(v)?"":"none";
  });
});

// Темная/светлая тема
document.getElementById("themeToggle").onclick=()=>document.body.classList.toggle("light");
